name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: amblyopia-trainer.exe

          - goos: linux
            goarch: amd64
            binary: amblyopia-trainer-linux

          - goos: darwin
            goarch: amd64
            binary: amblyopia-trainer-macos-intel

          - goos: darwin
            goarch: arm64
            binary: amblyopia-trainer-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist

          go build \
            -ldflags="-s -w" \
            -o dist/${{ matrix.binary }} \
            .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
