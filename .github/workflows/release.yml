name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: amblyopia-trainer-linux

          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            binary: amblyopia-trainer.exe

          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: amblyopia-trainer-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # Linux dependencies only
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
          build-essential \
          pkg-config \
          libasound2-dev \
          libx11-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxxf86vm-dev \
          libgl1-mesa-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/${{ matrix.binary }} \
            .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*